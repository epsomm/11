name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 가상 리눅스 환경으로 프로젝트 소스 코드 다운로드
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 빌드 환경에 JDK 17 및 자동 캐시 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. NDK 25 및 CMake 필수 빌드 패키지 다운로드
    - name: Install Android SDK, NDK, and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    # 4. Manifest 병합 오류 완벽 해결: 이스케이프 기호를 완전 차단한 순수 XML 강제 주입
    - name: Auto Reconstruct Android Manifest File Structure
      run: |
        mkdir -p app/src/main
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
        echo '<manifest xmlns:android="http://android.com">' >> app/src/main/AndroidManifest.xml
        echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
        echo '    <application' >> app/src/main/AndroidManifest.xml
        echo '        android:allowBackup="false"' >> app/src/main/AndroidManifest.xml
        echo '        android:label="NativeChat"' >> app/src/main/AndroidManifest.xml
        echo '        android:hasCode="false"' >> app/src/main/AndroidManifest.xml
        echo '        android:theme="@android:style/Theme.NoTitleBar.Fullscreen">' >> app/src/main/AndroidManifest.xml
        echo '        <activity android:name="android.app.NativeActivity"' >> app/src/main/AndroidManifest.xml
        echo '            android:label="NativeChat"' >> app/src/main/AndroidManifest.xml
        echo '            android:configChanges="orientation|keyboardHidden|screenSize"' >> app/src/main/AndroidManifest.xml
        echo '            android:exported="true">' >> app/src/main/AndroidManifest.xml
        echo '            <meta-data android:name="android.app.lib_name" android:value="nativechat" />' >> app/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
        echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> app/src/main/activity>' >> app/src/main/AndroidManifest.xml
        echo '        </activity>' >> app/src/main/AndroidManifest.xml
        echo '    </application>' >> app/src/main/AndroidManifest.xml
        echo '</manifest>' >> app/src/main/AndroidManifest.xml

    # 5. gradlew 파일 누락 방지를 위한 빌드 래퍼 복원 작업
    - name: Generate Missing Gradle Wrapper
      run: gradle wrapper

    # 6. 복원된 구동 파일에 리눅스 권한 주입
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # 7. C++ Native 최적화 컴파일 및 에셋 없는 최종 안드로이드 APK 파일 빌드
    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    # 8. 빌드 완료된 결과물(.apk)을 깃허브 액션 웹 페이지로 아티팩트 업로드
    - name: Upload Build Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: NativeChat-NoAsset-APK
        path: app/build/outputs/apk/debug/app-debug.apk
