name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 가상 환경 리눅스로 C++ 프로젝트 소스 파일 체크아웃
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 빌드 환경에 JDK 17 및 Gradle 캐시 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. NDK 25 및 CMake 빌드 바이너리 도구 팩 강제 설치
    - name: Install Android SDK, NDK, and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    # 4. gradlew 파일이 없을 경우 시스템 내장 gradle을 호출하여 래퍼 파일 세트를 즉시 자동 복원 생성
    - name: Generate Missing Gradle Wrapper
      run: gradle wrapper

    # 5. 복원된 gradlew 실행 파일에 리눅스 권한 부여
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # 6. 순수 Native C++ 코드 기반 안드로이드 최종 APK 컴파일 수행
    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    # 7. 컴파일 완성된 APK를 GitHub 웹 화면 다운로드 아티팩트로 전송
    - name: Upload Build Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: NativeChat-NoAsset-APK
        path: app/build/outputs/apk/debug/app-debug.apk
